# ===================================================================================
# GENFITY AI GATEWAY SERVICE - CI/CD PIPELINE
# ===================================================================================
#
# Build and deploy Go service via Docker
#
# Required Secrets:
#   - GHCR_TOKEN: GitHub Container Registry token
#   - VPS_HOST, VPS_USER, VPS_SSH_KEY: SSH access
#   - ENV_FILE: Production .env content
#
# ===================================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, deploy existing image'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/genfity-ai-gateway-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================================================================================
  # TEST JOB
  # ===================================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_only != 'true' }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

  # ===================================================================================
  # BUILD JOB
  # ===================================================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ===================================================================================
  # DEPLOY JOB
  # ===================================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      (needs.build.result == 'success' || github.event.inputs.deploy_only == 'true') &&
      github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Log secrets usage
        run: |
          echo "📋 Secrets used in this workflow:"
          echo "  - VPS_HOST: ${{ secrets.VPS_HOST && '✅ Set' || '❌ Not set' }}"
          echo "  - VPS_USER: ${{ secrets.VPS_USER && '✅ Set' || '❌ Not set' }}"
          echo "  - VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY && '✅ Set' || '❌ Not set' }}"
          echo "  - GHCR_TOKEN: ${{ secrets.GHCR_TOKEN && '✅ Set' || '❌ Not set' }}"
          echo "  - ENV_FILE: ${{ secrets.ENV_FILE && '✅ Set' || '❌ Not set' }}"

      - name: Update ENV file on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "📝 Updating .env file on server (full replace)..."
            printf '%s' "$ENV_FILE" | ssh $VPS_USER@$VPS_HOST "cat > /tmp/genfity-ai-gateway.env && sudo install -m 600 -o root -g root /tmp/genfity-ai-gateway.env /home/$VPS_USER/genfity/genfity-ai-gateway/.env && rm -f /tmp/genfity-ai-gateway.env"
            echo "✅ ENV file updated with full replace!"
          else
            echo "⏭️ ENV_FILE secret not set, skipping .env update"
          fi

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          echo "🚀 Deploying with docker compose..."

          ssh $VPS_USER@$VPS_HOST << ENDSSH
            set -euo pipefail
            cd ~/genfity/genfity-ai-gateway

            # Force pull latest changes (override local, no conflicts)
            git remote set-url origin https://x-access-token:${GHCR_TOKEN}@github.com/${{ github.repository }}.git
            git fetch origin main
            git reset --hard origin/main
            git remote set-url origin https://github.com/${{ github.repository }}.git

            # Login to GHCR (mygads hardcoded — same pattern as genfity-app
            # workflow which works in production).
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u mygads --password-stdin

            # Pin to the IMMUTABLE commit-SHA tag, never :latest. :latest is
            # mutable and has raced to an older digest before (a concurrent
            # push re-pointing it), so a deploy that "succeeds" could run
            # stale code. The SHA tag (format=long) is unique per commit.
            export IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

            # IMPORTANT: pass IMAGE THROUGH sudo. This box has sudoers
            # 'Defaults env_reset', which drops the caller's env — so
            # 'sudo -E docker compose' silently loses IMAGE and compose falls
            # back to its ':latest' default (the root cause of stale deploys).
            # 'sudo env IMAGE=... docker compose' is the only reliable form.
            sudo env IMAGE="\$IMAGE" docker compose pull
            sudo env IMAGE="\$IMAGE" docker compose up -d --force-recreate

            # Verify the running container is ACTUALLY the image we just
            # deployed. Health check alone (curl the port) can't tell stale
            # from fresh, so compare the running revision label against this
            # commit and fail loudly on mismatch.
            EXPECTED="${{ github.sha }}"
            RUNNING=\$(sudo docker inspect genfity-ai-gateway --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
            echo "Expected revision: \$EXPECTED"
            echo "Running revision:  \$RUNNING"
            if [ "\$RUNNING" != "\$EXPECTED" ]; then
              echo "❌ Deployed revision mismatch — container is NOT running the pushed commit"
              sudo docker ps -a | grep genfity-ai-gateway || true
              exit 1
            fi
            echo "✅ Running revision matches deployed commit"

            # Cleanup old images
            echo "🧹 Cleaning up..."
            sudo docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health Check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🏥 Running health check..."
          sleep 20

          ssh $VPS_USER@$VPS_HOST 'for i in 1 2 3 4 5; do \
            if curl -sf http://localhost:8094/health > /dev/null 2>&1; then \
              echo "✅ Health check passed!"; \
              sudo docker ps | grep genfity-ai-gateway; \
              exit 0; \
            fi; \
            echo "Attempt $i failed, retrying..."; \
            sleep 5; \
          done; \
          echo "❌ Health check failed!"; \
          sudo docker logs genfity-ai-gateway --tail 50; \
          exit 1'

      - name: Generate summary
        if: success()
        run: |
          echo "## 🚀 AI Gateway Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://ai.genfity.com" >> $GITHUB_STEP_SUMMARY

  # ===================================================================================
  # CLEANUP JOB
  # ===================================================================================
  cleanup:
    name: Cleanup Old Resources
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Cleanup server
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST 'echo "🧹 Running scheduled cleanup..." && \
            sudo docker system prune -f --filter "until=24h" && \
            echo "✅ Cleanup complete!"'
