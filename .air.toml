root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["cmd /c \"taskkill /F /IM main.exe /T >NUL 2>NUL & exit /B 0\"", "cmd /c \"taskkill /F /IM main.exe~ /T >NUL 2>NUL & exit /B 0\""]
  cmd = "goose -dir internal/database/migrations postgres \"postgresql://genfity:dbgenfity2026@localhost:5432/genfity_ai_gateway?sslmode=disable\" up; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; go build -o ./tmp/main.exe ./cmd/http"
  bin = "./tmp/main.exe"
  full_bin = "./tmp/main.exe"
  entrypoint = "./tmp/main.exe"
  include_ext = ["go", "sql", "toml", "env"]
  exclude_dir = ["tmp", "node_modules", ".git", "docs"]
  delay = 1000
  kill_delay = "500ms"
  stop_on_error = true

[log]
  time = false
  main_only = true

[screen]
  clear_on_rebuild = true
  keep_scroll = false

[misc]
  clean_on_exit = true
