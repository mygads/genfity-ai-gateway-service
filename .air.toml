root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["cmd /c \"taskkill /F /IM genfity-ai-gateway.exe /T >NUL 2>NUL & exit /B 0\"", "cmd /c \"taskkill /F /IM genfity-ai-gateway.exe~ /T >NUL 2>NUL & exit /B 0\""]
  cmd = "./build.bat"
  bin = "./tmp/genfity-ai-gateway.exe"
  full_bin = "./tmp/genfity-ai-gateway.exe"
  entrypoint = "./tmp/genfity-ai-gateway.exe"
  include_ext = ["go", "sql", "toml", "env"]
  exclude_dir = ["tmp", "node_modules", ".git", "docs"]
  delay = 1000
  kill_delay = "500ms"
  stop_on_error = true

[log]
  time = false
  main_only = true

[screen]
  clear_on_rebuild = true
  keep_scroll = false

[misc]
  clean_on_exit = true


